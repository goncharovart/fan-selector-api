version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
