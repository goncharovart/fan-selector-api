# Cloud Build pipeline: test → build image → push to Artifact Registry → deploy to Cloud Run.
# Trigger this manually with `gcloud builds submit` or wire it to a GitHub trigger.

substitutions:
  _REGION: europe-west1
  _SERVICE: fan-selector-api
  _AR_REPO: containers
  _DB_INSTANCE: ''  # set to "project:region:instance" to attach Cloud SQL

steps:
  # 1. Unit tests must pass before we waste time on an image build.
  - id: test
    name: golang:1.23
    entrypoint: bash
    args:
      - -ceu
      - |
        go test ./...

  # 2. Build the image, tagged with both SHORT_SHA and "latest".
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VERSION=$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  # 3. Push both tags.
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}

  # 4. Deploy to Cloud Run. Secrets and Cloud SQL are wired in here.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        FLAGS="--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA \
               --region=${_REGION} \
               --platform=managed \
               --allow-unauthenticated \
               --port=8080 \
               --cpu=1 \
               --memory=512Mi \
               --min-instances=0 \
               --max-instances=10 \
               --concurrency=80 \
               --timeout=30s \
               --set-secrets=DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest \
               --set-env-vars=LOG_LEVEL=info,CACHE_TTL=5m"
        if [ -n "${_DB_INSTANCE}" ]; then
          FLAGS="$FLAGS --add-cloudsql-instances=${_DB_INSTANCE}"
        fi
        gcloud run deploy ${_SERVICE} $FLAGS

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
