# Local development stack: Postgres + Redis.
# Bring up with `docker compose up -d`. The Go server connects via .env vars.

services:
  postgres:
    image: postgres:16-alpine
    container_name: fan-selector-postgres
    environment:
      POSTGRES_USER: fan
      POSTGRES_PASSWORD: fan
      POSTGRES_DB: fan_selector
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fan -d fan_selector"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fan-selector-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
